name: Publish Docs to GitHub Pages

# Триггер: запускать только при изменениях в папке docs или конфиге,

# и только в ветке master

on:

  push:

    branches:

      - master

    paths:

      - 'docs/**'

      - 'mkdocs.yml'

      - '.github/workflows/docs-deploy.yml'

permissions:

  contents: write # Разрешаем роботу писать в репозиторий

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      # 1. Скачиваем код репозитория

      - uses: actions/checkout@v4

      # 2. Устанавливаем Python

      - name: Set up Python

        uses: actions/setup-python@v4

        with:

          python-version: 3.x

      # 3. Кэшируем pip (чтобы ускорить сборку в будущем)

      - uses: actions/cache@v2

        with:

          key: ${{ github.ref }}

          path: .cache

      # 4. Устанавливаем зависимости из нашего файла

      - name: Install dependencies

        run: pip install -r requirements.txt

      # 5. Собираем и публикуем

      # Мы используем стандартную команду mkdocs, но настраиваем git-бота

      - name: Deploy to GitHub Pages

        run: |

          git config user.name github-actions

          git config user.email github-actions@github.com

          mkdocs gh-deploy --force

